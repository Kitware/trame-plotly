name: Test and Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Install and run pre-commit
      - run: |
          pip install pre-commit
          pre-commit install
          pre-commit run --all-files

  pytest:
    name: Pytest ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
        config:
          - { name: "Linux", os: ubuntu-latest }
          - { name: "MacOSX", os: macos-latest }
          - { name: "Windows", os: windows-latest }

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install and Run Tests
        run: |
          pip install .
          pip install -r tests/requirements.txt
          # Run the tests with coverage so we get a coverage report too
          pip install coverage
          coverage run --source . -m pytest .
          # Print the coverage report
          coverage report -m

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5.5.2

  test-npm-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build Vue Components
        run: |
          cd vue-components
          npm ci
          npm run build

  release:
    needs: [pre-commit, pytest, test-npm-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      id-token: write
      attestations: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/trame-plotly
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build Vue Components
        run: |
          cd vue-components
          npm ci
          npm run build

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact attestation for sdist and wheel
        if: steps.release.outputs.released == 'true'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: "dist/*"

      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'
